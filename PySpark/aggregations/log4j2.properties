# Set everything to ERROR by default
rootLogger.level = ERROR

# Suppress specific Java loggers
logger.spark.name = org.apache.spark
logger.spark.level = ERROR

logger.hadoop.name = org.apache.hadoop
logger.hadoop.level = ERROR

logger.jetty.name = org.eclipse.jetty
logger.jetty.level = ERROR

logger.scala.name = scala
logger.scala.level = ERROR

# Console appender
appender.console.type = Console
appender.console.name = STDOUT
appender.console.target = SYSTEM_OUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss,SSS} [%t] %-5p %c{1.} - %m%n

# Root logger
rootLogger.appenderRef.stdout.ref = STDOUT
